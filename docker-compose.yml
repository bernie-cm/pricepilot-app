services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pricepilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pricepilot}
      POSTGRES_DB: ${POSTGRES_DB:-pricepilot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pricepilot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-pricepilot}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-pricepilot}
    ports:
      - "5672:5672"    # AMQP — application connections
      - "15672:15672"  # Management UI — open in browser to inspect queues
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
