name: CI

# Triggers: this workflow runs on every pull request targeting main.
# It must pass before the PR can be merged (enforced by branch protection).
on:
  pull_request:
    branches: [main]

# Concurrency: if you push a new commit to a PR while CI is already running,
# cancel the old run and start fresh. Prevents a queue of stale runs building up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Job 1: Validate infrastructure files ─────────────────────────────────────
  # Always runs. Checks YAML syntax and Helm chart structure.
  # No Python or Docker knowledge required — these files exist from day one.
  validate:
    name: Validate (YAML + Helm)
    runs-on: ubuntu-latest   # GitHub provides this Linux runner for free
    steps:
      # Every job must check out the code first. Without this, the runner has
      # an empty workspace — none of your files exist yet.
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml
          # Scans all .yml and .yaml files in the repo against our config.
          # Catches syntax errors in docker-compose, lefthook, K8s manifests, etc.

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm charts
        run: |
          if [ -f charts/pricepilot/Chart.yaml ]; then
            helm lint charts/pricepilot
          else
            echo "No Chart.yaml yet — skipping helm lint"
          fi
          # Gracefully skips until we create a real Helm chart.
          # Once Chart.yaml exists, this validates the chart structure and templates.

  # ── Job 2: Lint Python ────────────────────────────────────────────────────────
  # Runs formatting, lint, type checks, and security scan against Python files.
  # Steps are skipped automatically if no Python files exist yet.
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Check whether any Python files exist in services/.
      # Stores the result as a step output so later steps can read it.
      - name: Check for Python files
        id: check
        run: |
          if find services -name "*.py" | grep -q .; then
            echo "has_files=true" >> $GITHUB_OUTPUT
          else
            echo "has_files=false" >> $GITHUB_OUTPUT
            echo "No Python files found — linting steps will be skipped"
          fi

      # uv is our Python package manager. Installing it gives us access to
      # 'uvx', which runs a tool in a temporary environment without polluting
      # the runner's global Python install.
      - name: Install uv
        if: steps.check.outputs.has_files == 'true'
        uses: astral-sh/setup-uv@v4

      - name: ruff format check
        if: steps.check.outputs.has_files == 'true'
        run: uvx ruff format --check services/
        # Fails if any file isn't formatted correctly.
        # Does NOT auto-fix in CI — you fix locally and push again.

      - name: ruff lint
        if: steps.check.outputs.has_files == 'true'
        run: uvx ruff check services/
        # Catches bugs, unused imports, anti-patterns.

      - name: mypy type check
        if: steps.check.outputs.has_files == 'true'
        run: uvx mypy services/ --ignore-missing-imports --exclude 'alembic/'
        # Static type checking. --ignore-missing-imports prevents failures
        # on third-party libraries that don't ship type stubs.

      - name: bandit security scan
        if: steps.check.outputs.has_files == 'true'
        run: uvx bandit -r services/ -ll
        # -ll = only report medium and high severity findings.

  # ── Job 3: Test ───────────────────────────────────────────────────────────────
  # Runs pytest. Depends on lint-python passing first — no point running tests
  # if the code doesn't even lint cleanly.
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint-python]   # waits for lint-python to complete successfully
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for Python files
        id: check
        run: |
          if find services -name "*.py" | grep -q .; then
            echo "has_files=true" >> $GITHUB_OUTPUT
          else
            echo "has_files=false" >> $GITHUB_OUTPUT
          fi

      - name: Install uv
        if: steps.check.outputs.has_files == 'true'
        uses: astral-sh/setup-uv@v4

      - name: Run tests
        if: steps.check.outputs.has_files == 'true'
        run: uvx pytest services/ -v --tb=short
        # --tb=short gives concise tracebacks — enough to understand failures
        # without flooding the log.

  # ── Job 4: Lint Dockerfiles ───────────────────────────────────────────────────
  # Checks Dockerfiles for best practices. Skipped until Dockerfiles exist.
  lint-docker:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for Dockerfiles
        id: check
        run: |
          if find . -name "Dockerfile*" -not -path "./.git/*" | grep -q .; then
            echo "has_files=true" >> $GITHUB_OUTPUT
          else
            echo "has_files=false" >> $GITHUB_OUTPUT
            echo "No Dockerfiles found — skipping hadolint"
          fi

      - name: Lint Dockerfiles
        if: steps.check.outputs.has_files == 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

  # ── Job 5: CI Pass gate ───────────────────────────────────────────────────────
  # This is the ONLY job to add to GitHub branch protection required status checks.
  #
  # Why? If you add each job individually to branch protection, you'd have to
  # update the branch protection rules every time you add a new CI job. Instead,
  # this single gate job depends on all others and is the one thing branch
  # protection watches.
  #
  # 'if: always()' means this job runs even if upstream jobs failed or were
  # skipped — so it can report the failure rather than just not running.
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [validate, lint-python, test, lint-docker]
    if: always()
    steps:
      - name: All checks passed
        run: |
          # 'needs.*.result' is an array of results from all upstream jobs.
          # If any job failed or was cancelled, exit with an error.
          if echo '${{ toJSON(needs.*.result) }}' | grep -qE '"failure"|"cancelled"'; then
            echo "One or more CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All CI checks passed."
