# alembic.ini — Alembic configuration file.
#
# Alembic reads this file when you run `alembic` commands from the
# services/price-service/ directory.

[alembic]
# Path to the directory that contains env.py and the versions/ folder.
script_location = alembic

# printf-style string formatting of migration file names.
# %(rev)s  = short revision ID (e.g. 3d71e4b2)
# %(slug)s = slugified version of the -m message you provide
# Result example: 2024_03_01_3d71e4b2_add_products_table.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Alembic will prepend this path to sys.path so it can import our app's
# models. The src/ layout means we need to tell it where to look.
prepend_sys_path = src

# Timezone for timestamps in generated migration filenames.
timezone = UTC

# sqlalchemy.url is intentionally left blank here.
# We override it in alembic/env.py using our pydantic-settings config,
# so the real DATABASE_URL comes from the environment — never hardcoded.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
